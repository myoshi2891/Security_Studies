# GitHub Copilot — Content Exclusion設定
# 機密ファイルをAI推論コンテキストから完全除外
content_exclusion:
  paths:
    - "**/.env*"              # 環境変数（DBパスワード・APIキー等）
    - "**/*.pem"              # TLS証明書・秘密鍵
    - "**/*.key"              # 暗号鍵ファイル
    - "**/*.p12"              # PKCS12キーストア
    - "**/internal-config.*"  # 内部設定ファイル
    - "**/secrets/**"         # シークレットディレクトリ
    - "**/.aws/**"            # AWSクレデンシャル
    - "**/credentials.*"      # 汎用クレデンシャルファイル